name: Fix PR Review Comments

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/aiderfix')
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: hari-h-k-k/aider-bot@main
        with:
          morph_api_key: ${{ secrets.MORPH_API_KEY }}
          comment_body: ${{ github.event.comment.body }}
